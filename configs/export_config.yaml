# ONNX Export Configuration
# Configuration for exporting YOLOv8 models to ONNX format

onnx_export:
  # Input model path (relative to project root)
  input_model: models/best.pt

  # Output ONNX model path
  output_onnx: models/best.onnx

  # Export purpose:
  # - rknn: ONNX for RKNN conversion (Rockchip backend expected)
  # - anylabeling: ONNX for X-Anylabeling (official Ultralytics expected)
  purpose: rknn

  # If true, abort when current backend does not match export purpose
  strict_backend_check: true

  # Model settings
  imgsz: 640 # Input image size

  # ONNX export options
  opset_version: 12 # ONNX opset version (recommended for RKNN)
  simplify: false # Avoid onnxsim for RKNN export stability

  # Format options
  format: onnx

  # Hardware target
  device: 0 # GPU device (0 for first GPU, -1 for CPU)

# Note: This script uses the Rockchip-customized ultralytics_yolov8
# for RKNN path, while X-Anylabeling export should use official ultralytics
