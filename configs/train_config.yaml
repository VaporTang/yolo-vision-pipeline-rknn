# YOLOv8 Training Configuration
# This configuration is used for training YOLOv8 models

training:
  model: yolov8s.pt # Model variant: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  data: configs/data.yaml # Path to dataset YAML file
  epochs: 300 # Number of training epochs
  batch: -1 # Batch size (-1 for auto)
  imgsz: 640 # Image size (640 for YOLO)
  device: 0 # GPU device ID (0 for first GPU, -1 for CPU)
  workers: 8 # Number of data loading workers
  patience: 50 # EarlyStopping patience
  project: models/training_results # Save directory
  name: yolo_train # Experiment name

  # Advanced training settings (optional)
  close_mosaic: 10 # Disable mosaic augmentation in final epochs
  save_period: 10 # Save checkpoint every N epochs (-1 to disable)
  pretrained: true # Use pretrained weights
